name: Create Release with 7z Archive

on:
  push:
    branches:
      - master_1.5
  pull_request:
    branches:
      - master_1.5
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag'
        required: false
        default: ''

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version and check tag
        id: version
        run: |
          VERSION=$(cat version)
          if [ -n "${{ github.event.inputs.version_tag }}" ]; then
            VERSION="${VERSION}-${{ github.event.inputs.version_tag }}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

          if git rev-parse "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists. Skipping release."
            echo "SKIP=true" >> $GITHUB_OUTPUT
          else
            echo "New version: ${VERSION}"
            echo "SKIP=false" >> $GITHUB_OUTPUT
          fi

      - name: Read release notes
        if: steps.version.outputs.SKIP == 'false'
        run: |
          if [ ! -f RELEASE_NOTES.md ]; then
            echo "ERROR: RELEASE_NOTES.md not found. Create it before releasing." >&2
            exit 1
          fi
          cp RELEASE_NOTES.md changelog.md

      - name: Create and push tag
        if: github.event_name != 'pull_request' && steps.version.outputs.SKIP == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.VERSION }}
          git push origin ${{ steps.version.outputs.VERSION }}

      - name: Prepare build structure
        if: steps.version.outputs.SKIP == 'false'
        run: |
          mkdir -p build_temp
          cp -r fomod build_temp/
          cp -r optionals build_temp/
          cp -r patches build_temp/
          cp -r src build_temp/
          cp Installation_Instructions+Changelog.txt build_temp/
      
          echo "? files to build:"
          ls -la build_temp/

      - name: Create 7z archive
        if: steps.version.outputs.SKIP == 'false'
        uses: edgarrc/action-7z@v1
        with:
          args: 7z a -t7z -mx=9 warfare-alife-overhaul-${{ steps.version.outputs.VERSION }}.7z ./build_temp/* -r

      - name: Clean up
        if: steps.version.outputs.SKIP == 'false'
        run: rm -rf fomod

      - name: Create GitHub Release
        if: github.event_name != 'pull_request' && steps.version.outputs.SKIP == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          body_path: changelog.md
          files: warfare-alife-overhaul-${{ steps.version.outputs.VERSION }}.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}